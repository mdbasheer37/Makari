services:
  - type: web
    name: makari-islamic-tv-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: makari-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
    disk:
      name: media-storage
      mountPath: /opt/render/project/src/media
      sizeGB: 10

databases:
  - name: makari-db
    databaseName: makari_tv
    user: makari_admin
    plan: free
